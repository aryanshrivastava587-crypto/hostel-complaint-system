<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Complaint Portal</title>
    <!-- Modern font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                     <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                     <h1>Hostel Hub</h1>
                </div>
                <p>Submit and track your hostel complaints instantly.</p>
                
                <!-- NEW: Auth Status -->
                <div style="margin-top: 15px; font-weight: 500;">
                    <span id="loggedInUser" style="color: var(--accent-color);">Checking Security Pass...</span>
                    <br>
                    <button id="logoutBtn" class="btn-secondary" style="display:none; margin-top: 10px; margin-left: auto; margin-right: auto;">Logout</button>
                </div>
            </div>
        </header>

        <!-- NEW: Portal Selection Section -->
        <section id="portalSelection" class="card" style="max-width: 500px; margin: 0 auto; text-align: center;">
            <h2 style="font-size: 1.8rem; margin-bottom: 10px;">Welcome to Hostel Hub</h2>
            <p style="color: var(--text-secondary); margin-bottom: 30px;">Choose your authorized access port.</p>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <button id="studentPortalBtn" class="btn-primary" style="padding: 1.25rem; font-size: 1.1rem; border-radius: 12px;">🎓 I am a Student</button>
                <button id="adminPortalBtn" class="btn-secondary" style="padding: 1.25rem; font-size: 1.1rem; border-radius: 12px; border: 2px solid var(--border-color);">👔 I am a Warden (Admin)</button>
            </div>
        </section>

        <!-- NEW: Login / Register Section -->
        <section id="authSection" class="card" style="max-width: 400px; margin: 0 auto; display: none;">
            <button id="backToPortalBtn" class="btn-secondary" style="margin-bottom: 20px; font-size: 0.8rem;">← Back to Portals</button>
            <h2 id="authTitle" style="text-align: center; margin-bottom: 20px;">Secure Login Area</h2>
            <form id="authForm">
                <div class="form-group">
                    <label for="authUsername">Username</label>
                    <input type="text" id="authUsername" required>
                </div>
                <div class="form-group">
                    <label for="authPassword">Password</label>
                    <input type="password" id="authPassword" required>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" class="btn-primary" id="loginBtn">Login</button>
                    <button type="button" class="btn-secondary" id="registerBtn" style="width: 100%;">Register</button>
                </div>
                <div id="authMessage" class="form-message"></div>
            </form>
        </section>

        <!-- Main Content (Hidden until Logged In!) -->
        <main class="main-content" id="mainContent" style="display: none;">
            <!-- Form Section (Left Side - Hidden for Admins) -->
            <section class="form-section card" id="studentFormSection">
                <h2>Raise a Complaint</h2>
                <form id="complaintForm">
                    <div class="form-group">
                        <label for="studentName">Student Name</label>
                        <input type="text" id="studentName" required placeholder="Ex: John Doe">
                    </div>
                    <div class="form-group">
                        <label for="roomNumber">Room Number</label>
                        <input type="text" id="roomNumber" required placeholder="Ex: A-102">
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="" disabled selected>Select issue type</option>
                            <option value="Maintenance">Maintenance (Plumbing, Electrical)</option>
                            <option value="Housekeeping">Housekeeping (Cleaning)</option>
                            <option value="Internet">Internet/Wi-Fi</option>
                            <option value="Food">Mess/Food</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="description">Detailed Description</label>
                        <textarea id="description" rows="4" required placeholder="Describe the issue in detail..."></textarea>
                    </div>
                    <button type="submit" class="btn-primary" id="submitBtn">
                        Submit Complaint
                    </button>
                    <div id="formMessage" class="form-message"></div>
                </form>
            </section>

            <!-- Complaints List Section (Right Side) -->
            <section class="list-section">
                <div class="section-header">
                    <h2>Recent Complaints</h2>
                    <button class="btn-secondary" id="refreshBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                        Refresh
                    </button>
                </div>
                
                <div id="complaintsContainer" class="complaints-grid">
                    <div class="spinner">Loading complaints...</div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
